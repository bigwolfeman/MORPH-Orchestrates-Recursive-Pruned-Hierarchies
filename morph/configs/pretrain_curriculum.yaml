# MORPH Curriculum Pretraining — Phase P (dense bf16, length-bucketed multi-source ramp)
# Spec: Ai-notes/06-12-2026/MORPH-Curriculum-Pretraining/SPEC.md
# Run:  PYTHONPATH=$PWD python -m morph.training.train --config-name pretrain_curriculum
# Prereq: scripts/pretokenize.py has written shards to data.pretok_dir for every blend source.
#
# Inherits base.yaml, then overrides: dense-bf16 isolation (sparse pipeline + TST OFF), and the
# curriculum block. base.yaml's validated sparse run is untouched.
defaults:
  - base
  - _self_

model:
  # RoPE cache must cover the TOP stage; the ACTUAL training seq_len ramps per stage (curriculum).
  max_seq_len: 16384
  context_len: 4096            # stage-0 taper anchor; stepped by the scheduler at each transition

training:
  # ── Phase P isolation: sparse pipeline OFF (Phase D owns prune/carve/route) ──
  prune_start: 999999999
  compact_step: 999999999
  tst_bag_size: 0              # TST OFF (no overlapping data schedule during the context ramp)
  # ── dense bf16 (quant stack OFF — isolate the curriculum mechanics; quant already validated) ──
  ternary: false
  embed_quant: "off"
  attn_proj_quant: "off"
  adam8bit: false
  bf16: true
  compile: true
  # ── optimization ──
  lr: 3e-4                     # from-scratch cold start (higher than the resume-recipe 1e-4)
  lr_schedule: cosine
  min_lr: 3e-5
  warmup: 500                  # short warmup for the cold start (base.yaml's 0 was a resume recipe)
  grad_clip: 1.0
  weight_decay: 0.1
  # steps is overridden by the curriculum scheduler (sum of stage steps).
  eval_every: 500
  ckpt_every: 2500
  gen_every: 0
  seed: 0

# Routing OFF (Phase P is dense; routing belongs to Phase D).
routing:
  route_start: 999999999

# ── Curriculum: length-bucketed multi-source ramp ──────────────────────────────
# Measured ceilings (RTX 5090, 276M dense, scripts/mem_probe.py): sustained-safe micro-batch
# [4096→4, 8192→2, 16384→1]; grad-accum is throughput-free, so hold eff_batch via accumulation.
# stage_steps are a DEFAULT (front-loaded short context = most tokens); tune to taste / token budget.
curriculum:
  enabled: true
  pretok_dir: data/pretok      # scripts/pretokenize.py output (full shards, not the gate slice)
  # Runtime role guard. Pure post-training gold is refused by scripts/pretokenize.py,
  # scripts/pretok_hub.py, and morph/training/curriculum_data.py. reasoning_midtrain means
  # broad next-token LM data with reasoning traces/prompts, not SFT/RL aggregation gold.
  allowed_source_roles: [pretrain_bulk, reasoning_midtrain]
  eff_batch: 8                 # held constant across stages via grad-accum (mb×ga)
  blend:                       # token-proportioned weights (sum need not be 1); names = pretok shard dirs.
    # RefinedWeb-first reblend (2026-06-28): replace the OWT/Dolma-heavy judgment mix with a stronger
    # filtered/deduped web backbone. RefinedWeb is the broad general-web anchor; FineWeb-Edu supplies
    # higher-signal educational/knowledge text without making synthetic data carry the run. Broad
    # FineWeb remains available in scripts/pretokenize.py for an A/B arm, but is not mixed here to avoid
    # paying cross-corpus CommonCrawl overlap against RefinedWeb before we have cross-source dedup stats.
    # Synthetic/reasoning is deliberately capped at 10% total (nemotron_qa + reasoning), enough to bias
    # format/capability without turning pretraining into SFT-shaped model collapse risk.
    refinedweb: 0.48           # Falcon RefinedWeb: filtered/deduped CommonCrawl, broad web backbone
    fineweb_edu: 0.20          # high-signal educational web slice
    code: 0.12                 # code_search_net
    math: 0.08                 # math/proofs
    reasoning: 0.06            # procedural verified CoT / reasoning-shaped LM text
    nemotron_qa: 0.04          # grounded synthetic QA, capped
    dharma: 0.02               # domain text; small enough to avoid repeated-epoch dominance
  stages:                      # seq_len = bucket-native length; context_len = RoPE taper anchor
    - {seq_len: 4096,  context_len: 4096,  micro_batch: 4, steps: 20000}   # ga 2
    - {seq_len: 8192,  context_len: 8192,  micro_batch: 2, steps: 8000}    # ga 4
    - {seq_len: 16384, context_len: 16384, micro_batch: 1, steps: 3000}    # ga 8 (final long-ctx tail)

data:
  # val_loader still streams this (held-out wikitext eval is a follow-up wiring — TODO).
  dataset: /home/wolfe/.cache/huggingface/datasets/openwebtext/**/openwebtext-train-*.arrow
  tokenizer: bigcode/starcoder2-7b
  seq_len: 4096                # val seq_len (curriculum overrides train seq_len live)

wandb:
  project: morph
  entity: adew-me
  name: null
