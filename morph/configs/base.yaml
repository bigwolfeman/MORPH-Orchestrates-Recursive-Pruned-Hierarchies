# MORPH base config — local GPU (downsized from cloud target)
# Cloud target: 4:8:4, d_model=2048, 16 memory layers
# Local: 3:6:3, d_model=768, 4 memory layers

model:
  d_model: 768
  n_heads: 12
  n_layers: 12  # n_prelude + n_core + n_coda
  vocab_size: 49152  # StarCoder2
  max_seq_len: 4096

  # Parcae loop
  n_prelude: 3
  n_core: 6
  n_coda: 3
  mean_depth: 6
  max_depth: 8
  bptt_depth: 4

  # mHC channels
  channel_dims: [384, 256, 128]  # compute, context, memory

  # Attention (CCA+CSA+HCA, all features baked in)
  compression: 2
  n_kv_heads: 4
  csa_compress_ratio: 4
  hca_compress_ratio: 128
  top_k: 128
  window_size: 128
  context_len: 4096

  # Embeddings
  lorentz_fraction: 0.25  # 576 eucl + 192 Lorentz
  bigram_hash_vocab: 49152

  # Neural memory
  n_memory_layers: 4
  n_memory_tokens: 32
  memory_ssm_inject: true

  # STP
  stp_lambda: 0.02
  stp_tau: 64

  # Z-latent (split_nsm)
  d_z: 256
  segment_size: 1024

training:
  steps: 100000
  batch_size: 4
  lr: 1e-4
  warmup: 1500
  lr_schedule: cosine
  min_lr: 1e-5
  dropout: 0.1
  grad_clip: 1.0
  bf16: true
  compile: true
  compile_mode: default
  checkpointing: true

  # Memory warmup
  mac_warmup_steps: 2000

  # Pruning (Phase 2)
  prune_start: 50000
  prune_interval: 3000
  prune_rate: 0.05
  target_density: 0.25
  compact_step: 60000

  # Routing (Phase 3)
  route_start: 60000
  route_activation: 0.4

  # Optimizer extras
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95

  # Optional wrappers (set to true to activate)
  ternary: false           # STE ternary shadow weights (Phase 2)

  # Evaluation / logging
  eval_every: 500
  n_eval_batches: 20
  ckpt_every: 2500
  gen_every: 0      # 0 = disabled; set e.g. 5000 for generation samples
  gen_test: false   # run generation test at end of training

  # Resume
  # resume: null     # path to checkpoint to resume from

data:
  dataset: Skylion007/openwebtext
  tokenizer: bigcode/starcoder2-7b
  seq_len: 4096

wandb:
  project: morph
  entity: adew-me
  name: null   # auto-generated by wandb if null
