# MORPH base config — local GPU (downsized from cloud target)
# Cloud target: 4:8:4, d_model=2048
# Local: 3:6:3, d_model=768

model:
  d_model: 768
  n_heads: 12
  n_layers: 12  # n_prelude + n_core + n_coda
  vocab_size: 49152  # StarCoder2
  max_seq_len: 4096

  # Parcae loop
  n_prelude: 3
  n_core: 6
  n_coda: 3
  mean_depth: 6
  max_depth: 8
  bptt_depth: 4

  # Multi-rate residual channels
  channel_dims: [384, 256, 128]  # compute, context, memory

  # Attention (CCA+CSA+HCA, all features baked in)
  compression: 2
  n_kv_heads: 4
  csa_compress_ratio: 4
  hca_compress_ratio: 128
  top_k: 128
  window_size: 128
  context_len: 4096

  # Embeddings
  lorentz_fraction: 0.25  # 576 eucl + 192 Lorentz
  bigram_hash_vocab: 49152

  # STP (Semantic Tube Predictor — geometric regularizer)
  stp_lambda: 0.02
  stp_tau: 64

  # LM head fused cross-entropy chunk size (rows of B·T per chunk).
  # Smaller = less peak VRAM, more launch overhead. Tune per target.
  ce_chunk_size: 1024

  # Master kernel switch: true = fused Triton attn + fused CE (optimised);
  # false = eager references + full-logits CE (un-optimised A/B baseline).
  use_kernels: true

training:
  steps: 100000
  batch_size: 4
  lr: 1e-4
  warmup: 1500
  lr_schedule: cosine
  min_lr: 1e-5
  dropout: 0.1
  grad_clip: 1.0
  bf16: true
  compile: true
  compile_mode: default
  checkpointing: true

  # Pruning (Phase 2 → 3)
  prune_start: 6000
  prune_interval: 3000
  prune_rate: 0.05
  target_density: 0.25
  compact_step: 66000

  # Optimizer extras
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95

  # Optional wrappers (set to true to activate)
  ternary: false           # Ternary QAT — forward-STE on weights (see ternary_qat.py). Real
                           # QAT: forward uses {-1,0,+1}xscale, grad straight-through to the
                           # smooth shadow. Training/val ppl IS the deployed-ternary ppl.
  ternary_scope: backbone  # which weights to ternarize: backbone | backbone_attn | full
                           # (full = + attention projections + token/space/euclidean embeddings)
  ternary_threshold: 0.5   # |w/scale| > threshold → nonzero (Bonsai default)
  adam8bit: false          # 8-bit AdamW via bitsandbytes (quantizes optimizer state m,v to uint8)

  # FP8 training (torchao float8) — see docs/fp8_mixed_precision_training.md. FP8 the
  # large dense GEMMs only; attention/norms/fused-CE stay bf16 (DeepSeek-V3/Ling-1T mix).
  # Verified to accelerate on RTX 5090 sm_120 (2.4-4.3x GEMM). fp8=false → bit-identical bf16.
  fp8: false               # master switch
  fp8_recipe: dynamic      # dynamic (stateless, mandated for the loop) | rowwise
  fp8_scope: mlp           # mlp | attn_proj | mlp_attn_proj | all_gemm
                           #   attn_proj = CCA projections only (disjoint from ternary
                           #   backbone → for the ternary⊕FP8⊕8-bit 3-way combo)
  fp8_filter_min_dim: 256  # skip Linears with any dim < this (FP8 only helps big GEMMs)

  # Cross-iteration KV sharing (CLA) — see docs/cross_layer_kv_sharing.md. Cache the
  # per-core-layer KV bundle once and reuse (q-only recompute) in later loop iterations.
  # use_cla=false → bit-identical to today.
  use_cla: false
  cla_share_start: -1      # -1 = auto (n_nograd, first grad iter — gradient-correct)

  # Evaluation / logging
  eval_every: 500
  n_eval_batches: 20
  ckpt_every: 2500
  gen_every: 0      # 0 = disabled; set e.g. 5000 for generation samples
  gen_test: false   # run generation test at end of training

  # Resume
  # resume: null     # path to checkpoint to resume from

# Routing (Phase 4 — post-compact, post-settle)
# Set route_start=0 to disable routing entirely.
routing:
  route_start: 70000
  n_clusters: 16
  activation_ratio: 0.5
  aux_loss_coeff: 0.01

data:
  dataset: Skylion007/openwebtext
  tokenizer: bigcode/starcoder2-7b
  seq_len: 4096

wandb:
  project: morph
  entity: adew-me
  name: null   # auto-generated by wandb if null
