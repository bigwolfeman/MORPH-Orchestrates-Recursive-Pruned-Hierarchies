# MORPH base config — local GPU (downsized from cloud target)
# Cloud target: 4:8:4, d_model=2048
# Local: 3:6:3, d_model=768
#
# This is the SINGLE canonical default config reflecting the validated winning deploy stack:
#   - MORTAR sparse backend (ternary backbone, 0.25 BCSR via morph/sparse/stk)
#   - Routing ON (whole-body ReMoE; route_start = training-phase schedule, not an on/off gate)
#   - Full quant stack: ternary MLP backbone + int8 attn projections + int6 embeddings + adam8bit
#   - HC Cayley n=4 (JPmHC winner, fused Triton kernel default)
#   - LoopSSM base mechanism (DiagonalInjection, always-on; ablation arms #232 are NOT included)

model:
  d_model: 768
  n_heads: 12
  n_layers: 12  # n_prelude + n_core + n_coda
  vocab_size: 49152  # StarCoder2
  max_seq_len: 4096

  # Parcae loop
  n_prelude: 3
  n_core: 6
  n_coda: 3
  mean_depth: 6
  max_depth: 8
  bptt_depth: 4
  # L1 core-gain governor (#276): cap per-iteration looped-core amplification ‖h_new‖/‖h_a‖ per
  # sample to this ratio τ. 0.0 = OFF (bit-identical). Identity in the healthy regime (norm-preserving
  # HC residual → gain≈1); only shrinks the runaway step the weight-shared core amplifies T× (the
  # β1=0 detonation mode). Typical τ≈1.5–2.0.
  core_gain_clip: 0.0
  # Selective core-loop checkpointing (throughput knob). Checkpoint the first N of the bptt_depth
  # grad-iterations; later ones run eager (activations retained → no backward recompute → faster),
  # at the cost of retained activation memory. -1 = checkpoint ALL (default, bit-identical/safest).
  # Exact — never changes gradients (ppl-neutral). Tune down against VRAM headroom to raise tok/s.
  ckpt_grad_iters: -1

  # Multi-rate residual channels
  channel_dims: [384, 256, 128]  # compute, context, memory

  # Attention (CCA+CSA+HCA, all features baked in)
  compression: 2
  n_kv_heads: 4
  csa_compress_ratio: 4
  hca_compress_ratio: 128
  top_k: 128
  window_size: 128
  context_len: 4096

  # Embeddings
  lorentz_fraction: 0.25  # 576 eucl + 192 Lorentz
  bigram_hash_vocab: 49152

  # STP (Semantic Tube Predictor — geometric regularizer)
  stp_lambda: 0.02
  stp_tau: 64
  loop_stp_lambda: 0.0   # loop-axis STP (Task #276 de-coherence A); 0.0 = OFF, bit-exact

  # LM head fused cross-entropy chunk size (rows of B·T per chunk).
  # Smaller = less peak VRAM, more launch overhead. Tune per target.
  ce_chunk_size: 1024

  # Master kernel switch: true = fused Triton attn + fused CE (optimised);
  # false = eager references + full-logits CE (un-optimised A/B baseline).
  use_kernels: true

  # Multi-Rate Residual ablation. true = MultiRateResidual (per-channel learned gain);
  # false = plain additive residual (StandardResidual) — removes ~16 ms/step of channel
  # slice+cat copies + the unused alpha params.
  use_mrr: true

  # Residual mechanism. HC Cayley is the validated winner (JPmHC, arXiv 2602.18308):
  #   hc_cayley    → orthogonal n-stream mixer; 5.2× cheaper H^res than Sinkhorn + exact
  #                  dynamical isometry. DEFAULT and ONLY supported deploy path.
  #   hc_sinkhorn  → doubly-stochastic n-stream mixer (retained for reference; not default).
  #   null         → use_mrr decides (mrr / standard) — legacy path, do not use.
  # hc_* widens the residual stream to hc_streams parallel C-dim streams network-wide.
  residual_mode: hc_cayley
  hc_streams: 4            # expansion rate n (paper default); residual carrier → [B,S,n,768]
  hc_tau: 1.0              # softmax temperature for Hpre/Hpost
  hc_cayley_iters: 3       # Cayley fixed-point steps (paper s=2; 3 = safety margin)
  hc_cayley_alpha: 0.1     # Cayley step size α
  hc_sinkhorn_iters: 20    # Sinkhorn iterations (mHC value)
  hc_init_gain: 0.1        # W_fused init: smaller → closer to plain residual at init
  hc_use_kernel: true      # fused Triton HC kernels (cayley+cuda). false ⇒ eager refs (bit-faithful,
                           # slower) — the reference arm for the fused-vs-eager parity A/B.

  # Sparse MLP backbone: prelude+core+coda all use MortarLinear (CMS-prunable +
  # MORTAR 128×128 BCSR via morph/sparse/stk) — always on, no scope knob.
  # Constraint: all dims must be divisible by tile_size=16. d_model=768, d_ff=2048(auto) satisfy this.

  # ── GLA Retention branch (#230) ──────────────────────────────────────────
  # Gated Linear Attention added in PARALLEL to the windowed attention in the 2nd layer
  # (retention_layers) of prelude/core/coda — a global-context / cross-iteration memory branch.
  # Off → GLA not constructed → bit-identical to baseline.
  retention: true
  retention_layers: [1]          # within-section layer index that gets the branch (0-based)
  retention_heads: 0             # 0 → use n_heads
  retention_chunk: 256           # GLA chunk length; larger=faster (launch-bound)
  retention_gate_init: -6.0      # branch-gate logit; sigmoid(-6)≈0.0025 → ≈ identity at init
  retention_carry: true          # core: carry GLA state across loop iterations (false → reset)
  retention_gate_bias: 2.0       # GLA forget-gate logit bias (α near 1 = long memory)

training:
  steps: 100000
  batch_size: 4
  lr: 1e-4
  warmup: 0                       # validated mortar winner (phase_c_mortar_full25k_scratch): NO warmup
  lr_schedule: cosine            # cosine with min_lr==lr ⇒ FLAT 1e-4 (winner recipe; flat LR intentional)
  min_lr: 1e-4                   # == lr → flat LR the whole run (do NOT add cosine decay; validated)
  dropout: 0.1
  grad_clip: 1.0
  bf16: true
  compile: true
  compile_mode: default
  checkpointing: true

  # Pruning → MORTAR carve → routing schedule (Phases 2→3→4)
  # SLOWER-than-winner cadence (Wolfe 2026-06-12): prune every 167 steps from 3000 (was every 100).
  # MECHANISM at d=768 (verified by simulating prune_step_blocks' integer recurrence, not assumed):
  #  each event drops floor(alive·(1−prune_rate)) blocks, but the "guarantee progress" floor
  #  min(new_alive, alive−1) pins it to EXACTLY 1 block/event here — 0.5% of the small block grids
  #  (gate_up=192 blocks, down=96) is < 1. So at d=768 prune_rate is INERT; prune_INTERVAL is the
  #  ONLY speed lever. The bottleneck layer gate_up must drop 144 blocks (192→48) to reach 0.25,
  #  one per event ⇒ 144·167 ≈ 24k steps ⇒ density hits 0.25 by ~step 27050 (winner: 144·100 ⇒
  #  ~step 17400). The prune→0.25 window MUST close before compact_step, else carve() freezes a
  #  still-dense model (the old 6000/3000/0.05 cadence only hit ~0.80 density by step 20000).
  # NOTE: prune completes (~27050) inside the TST superposition window [0,30000); carve@29000 also
  #  inside (~1950-step settle, ≈ the winner's 2000); route@30000 = superposition→recovery boundary.
  prune_start: 3000
  prune_interval: 167            # SLOWER: 1.67× the winner's 100 — the REAL d=768 lever (see MECHANISM)
  prune_rate: 0.005              # = winner; INERT at d=768 (1 block/event floor). Only bites at cloud d=2048
  target_density: 0.25
  compact_step: 29000            # carve smooth-shadow → BCSR mortar_data (was 20000; moved to clear the slower ramp)
  cms_score_mode: taylor         # winner prune saliency (NOT grad); Taylor helps post-prune recovery (B3>B1)

  # ── Token Superposition Training (TST, #231 — Nous arXiv 2605.06546) ──
  # Two-phase curriculum: superposition (bag_size=s tokens/position, multi-hot CE) for
  # [0, tst_ratio·steps), then recovery (bag_size=0, standard NTP) for the remainder.
  # eval/gen ALWAYS use bag_size=0; tst_bag_size=0 ⇒ bit-identical to no-TST.
  # Paper sweet spot s=6, ratio=0.3. At steps=100000 ⇒ superposition [0,30000), recovery [30000,100000).
  # SCHEDULE NOTE: the superposition phase contains prune(3k–27k)/carve(29k); route(30k) engages at
  #   the superposition→recovery boundary — sparse structure is built under superposition, then
  #   recovers on 70k steps of clean NTP. TST was −4% ppl at d=768/15k on a quant-ONLY stack (#231);
  #   TST × full sparse pipeline is UNTESTED (and now × a slower prune — watch the density curve).
  tst_bag_size: 6                # s: tokens superposed per position (0 = TST off)
  tst_ratio: 0.3                 # fraction of steps in the superposition phase

  # Optimizer extras
  optimizer: adamw               # adamw (default deploy) | ademamix (arXiv:2409.03137) |
                                 # ademamix_b1zero (β1=0 fork: 2 buffers → AdamW8bit memory
                                 # parity, vs bnb's +50%; measured ~+1% step time)
  weight_decay: 0.1
  # ── Core-map spectral-norm penalty (Task #276 σ_max(J_core)-runaway cure) ──
  # Soft hinge L=lambda·Σ relu(σ_max(W)−cap)² over the core-block MLP linears (gate_up/down).
  # Caps the σ_max RUNAWAY that detonates β1=0/α=8 (E2: σ_max 22 healthy → 1e7 blown) WITHOUT
  # forcing σ_max≤1 (the working model needs σ_max~22). Healthy gate_up σ_max~1.5 → cap~3 only
  # bites on runaway. Loss-side ⇒ optimizer-agnostic ⇒ neutralises BOTH β1=0 and α=8. OFF when
  # cap or lambda ≤ 0 (exact baseline). See morph/training/spectral_penalty.py.
  spectral_penalty_cap: 0.0
  spectral_penalty_lambda: 0.0
  spectral_penalty_n_iter: 1
  beta1: 0.9
  beta2: 0.95                     # NOTE: AdEMAMix paper recommends beta2=0.999 — set per-arm.
  # ── AdEMAMix (only used when optimizer=ademamix) ──
  # AdamW + a 2nd very-slow momentum EMA (decay beta3) mixed in with weight alpha.
  # STABILITY: t_alpha/t_beta3 are the optimizer's OWN alpha/beta3 warmup horizons (NOT LR
  # warmup) — a large beta3 active from step 0 diverges even with LR warmup. null → default to
  # training.steps (essential; bnb pins beta3 at full strength from step 0 if these are None).
  beta3: 0.9999                  # slow-EMA decay (drop to 0.999 for short <100k runs)
  ademamix_alpha: 8.0            # fast/slow mix weight (paper LM default 8; 5 = conservative)
  ademamix_alpha_cap: 0.0        # (b1zero) HARD cap on scheduled α_t (Task #276). Detonation
                                 # threshold is α_t≈4.3-4.5 (per-block gain, E15). Cap ~3.5 to
                                 # SUSTAIN max stable AdEMAMix drive (warmup-ramp wastes early α). 0=off.
  ademamix_t_alpha: null         # null → training.steps
  ademamix_t_beta3: null         # null → training.steps
  ademamix_beta3_warmup_start: 0.9  # (b1zero only) β3-warmup START decay; β1=0 makes the
                                 # paper's log(β1) schedule degenerate, so we ramp from here.
  ademamix_fused: false          # (b1zero only) false = DE-FUSED path: bnb's dynamic blockwise
                                 # qmap for the 8-bit m2/ν state (same quant AdamW8bit uses;
                                 # preserves small ν → no underflow/throttle). true = custom
                                 # fused Triton kernel (LINEAR-int8 state) — faster opt.step but
                                 # its linear quant is lossy on small-ν lanes (underflow→explode
                                 # OR over-floor→LR-throttle, measured 2026-06-15). With LINEAR
                                 # quant this costs a measured ~0.10-nat tax vs de-fused; pair with
                                 # ademamix_fused_dynamic_qmap=true (Task #278) to remove it.
  ademamix_fused_dynamic_qmap: false  # (b1zero, fused only) Task #278 — replace the fused kernel's
                                 # UNIFORM linear-int8 state quant with bnb's OWN non-linear dynamic
                                 # map (signed m2, unsigned ν stored directly, no sqrt/floor) = the
                                 # SAME quantizer as the de-fused reference → kills the ~0.10-nat tax
                                 # at full fused speed (LUT gather + 8-step binary-search requant).
                                 # Same ~2.03 B/param memory. true is the deploy target once the
                                 # parity gate + A/B confirm no systematic bias.
  ademamix_fused_nu_floor: true  # (b1zero, LINEAR fused only) legacy code-1 floor on sqrt(ν)
                                 # (prevents int8 underflow→0). Exposed only to A/B-attribute the
                                 # linear tax (floor-bias vs resolution). Ignored when dynamic_qmap.
  ademamix_eps_inside: true      # (b1zero, de-fused only) true = √(ν/bc2+ε) safety floor;
                                 # false = √(ν/bc2)+ε true-Adam normalization. eps-inside floors
                                 # the denom at √ε≈1e-4 → THROTTLES live small-ν params (abundant
                                 # under ternary STE) → ~0.5 nats slower convergence (measured
                                 # 2026-06-16). It is only NEEDED for the fused linear-int8 kernel
                                 # (ν→0 underflow → ε explosion); the de-fused dynamic-qmap path
                                 # never underflows + _mask_dead_state handles prune blowup, so
                                 # set FALSE with fused:false for the fast+stable combo.
  ademamix_update_clip: 100.0    # (b1zero, de-fused) per-coord cap on the (g+α·m₂)/denom step in
                                 # Adam units (healthy step ~O(1), measured worst ~29). 0 = off.
                                 # THE fast+stable fix: bounds the per-step param change so a prune
                                 # topology-shock (ν lags the gradient jump) can't detonate a few
                                 # coords in one step (observed eps-out divergences @9400/@19400).
                                 # Only bites anomalous coords → no convergence throttle (unlike
                                 # eps-inside's blanket √ε floor). 100 = 3-4× over healthy worst.
  ademamix_update_rms_clip: 0.0  # (b1zero, de-fused) per-TENSOR cap on the RMS of (g+α·m₂)/denom.
                                 # The per-coord clip can't stop the COLLECTIVE oscillation that
                                 # detonates eps-outside on the looped/ternary first layer (no-prune
                                 # isolation 2026-06-16: ~500k prelude.0 coords spike COHERENTLY →
                                 # capping each still moves the whole layer). RMS clip bounds the herd:
                                 # healthy update-RMS ≈0.5, collective spike ≈9 → a cap ~2 kills the
                                 # overshoot, passes healthy untouched. 0 = off.
                                 # NOTE 2026-06-16: RMS=2 measured INVASIVE (healthy RMS ~2-2.4 across
                                 # many layers) — superseded by amsgrad/trust_ratio below.
  ademamix_stale_push_cap: 0.0   # (b1zero, de-fused) de-coherence B (Task #276): per-TENSOR cap
                                 # ‖α·m₂‖ ≤ c·‖g‖. E12: the σ_max inter-block-alignment detonation
                                 # fires when g COLLAPSES while m₂ stays large+stale → |α·m₂|/|g|
                                 # hits ~540-1200× → coherent off-tangent jump (per-coord clip can't
                                 # stop a coherent direction). Surgical: healthy |α·m₂|/|g|≈1.5 ≪ cap
                                 # (try 5-10) → fires ONLY on the collapse spike. 0 = off.
  ademamix_amsgrad: false        # (b1zero, de-fused) AMSGrad ν_max denominator memory (Reddi 2019):
                                 # denom uses max(ν_max,ν) not ν → prevents effective-LR rise on a
                                 # coord that was loud then went quiet (the measured eps-out small-ν
                                 # oscillation). Surgical (always-quiet coords keep ν_max=ν=advantage).
                                 # COST: +1 fp32 state buffer (forfeits β1=0 2-buffer memory win).
  ademamix_trust_ratio: 0.0      # (b1zero, de-fused) downward-only LARS/LAMB trust ratio τ: scale each
                                 # tensor's update so weights move ≤ τ·‖w‖/step. Relative per-layer
                                 # governor (scale-aware). 0 = off. Try ~1e-3..1e-2.
  # ── β1=0 ROOT-CAUSE FIX (b1zero, de-fused) — restore Adam's lost noise-gating, NO m1 buffer ──
  # DIAGNOSIS (2026-06-17): β1=0 puts raw g in the numerator (g+α·m₂)/√E[g²] → on a noise coord
  # that is a UNIT-VARIANCE random walk every step (Adam's (1−β1) fast-EMA averages it away; β1=0
  # can't). Damage accumulates → divergence (the 31.6 saturation spikes are its tail). These two
  # knobs damp the raw-g term selectively, statelessly (β1=0 2-buffer memory win preserved):
  ademamix_g_coef: 1.0           # γ: constant downscale of the raw-g numerator term (γ·g + α·m₂).
                                 # Crude (1−β1) mimic — damps ALL coords uniformly (throttles signal
                                 # too). Cheap CONTROL for the gate below. 1.0 = off. Try ~0.1–0.3.
  ademamix_g_snr_gate_kappa: 0.0 # κ: SOFT per-coord SNR gate. snr=|m₂|/denom ≈ |mean|/rms; gate =
                                 # floor+(1−floor)·clamp(snr/κ,0,1); numerator = gate·g + α·m₂. Noise
                                 # coord (snr→0)→gate=floor (~10× cut, = Adam); signal coord (snr≈1)→
                                 # gate=1 (full AdEMA advantage); fresh spike auto-gated (ν leads m₂).
                                 # THE root-cause fix. 0.0 = off. Try κ~0.3 first, sweep 0.2–0.5.
  ademamix_g_snr_gate_floor: 0.1 # gate floor (min raw-g weight on a pure-noise coord). ≈(1−β1)=0.1
                                 # matches Adam's noise damping; >0 so learning never fully stalls.
  # ── STE-cusp-vault fixes (2026-06-18; mechanism CONFIRMED: β1=0 raw step vaults a ternary cusp →
  #    ~100k core ternary codes flip in one step → looped core amplifies → explosion). Tested SEPARATELY. ──
  ademamix_num_beta1: 0.0        # ARM D: small momentum on the raw-g NUMERATOR term (m1=β1·m1+(1−β1)·g,
                                 # bias-corrected; 8-bit m1, ~+1 B/param). Smooths the step so it
                                 # approaches cusps gently (AdamW's β1 analog). 0.0=off (raw g). Try ~0.9.
  ademamix_flip_clamp_kappa: 0.0 # ARM A: per-tensor cap on realized ternary FLIP-RATE/step. s=mean|w|,
                                 # thr=0.5·s; if frac of codes that flip under p−lr·u > κ, scale that
                                 # tensor's update by κ/frac (stateless governor). 0.0=off. Try ~0.02-0.05.
  ademamix_stale_push_cap_coord: 0.0  # Task #276 PER-COORDINATE stale-push cap (b1zero, de-fused) —
                                 # the MECHANISM-MATCHED cure. Bound |α·m₂_i| ≤ c·|g_i| on each coord
                                 # (vs the per-tensor stale_push_cap's whole-tensor norm). The disease
                                 # is per-coord MAGNITUDE domination (ratio ‖α·m₂‖/‖g‖→14-60, cos→0:
                                 # stale slow-term huge where live g collapsed) — NOT sign-reversal, so
                                 # the Cautious/Magma sign gate failed (diverged @3020 < per-tensor's
                                 # 14020). This catches the few collapsed coords the tensor-norm hides.
                                 # Sign preserved. 0.0=off; try ~0.5-2.0 (smaller=tighter).
  ademamix_align_gate_mode: "off"  # Task #276 PER-COORD alignment gate (b1zero, de-fused; Cautious/Magma).
                                 # off|cautious|soft. Gates the final per-coord update u against the
                                 # CURRENT gradient g: zero/damp coords where u·g≤0 (stale α·m₂ pointing
                                 # against g — the cure the per-TENSOR stale_push_cap can't be, since a
                                 # tensor norm hides per-coord sign disagreement). cautious=hard mask
                                 # 1[u·g>0]+mean-preserving renorm (arXiv:2411.16085); soft=sigmoid(
                                 # sign(u·g)/τ) damp (Magma arXiv:2602.15322). NOTE: relies on g's sign;
                                 # composes with (not replaces) magnitude governors when g collapses.
  ademamix_align_gate_tau: 1.0   # soft-mode temperature (smaller→sharper, →hard mask). Unused if cautious.
  ademamix_align_renorm: true    # cautious mean-preserving rescale u*=numel/Σmask (preserves avg step).
  ademamix_align_renorm_cap: 0.0 # cap the renorm amplification (0=unbounded). e.g. 4.0 bounds the
                                 # survivor-amplification when most coords disagree at a collapse.
  ademamix_track_diag: false     # per-tensor optimizer telemetry (snr-gate mean/low, clip/cap counts).
                                 # OFF saves ~67ms/step on the de-fused path (454-tensor sync loops);
                                 # param update is BIT-IDENTICAL either way. true → for optimizer-debug.
  ademamix_m2_prune_decay: 0.0   # Task #276 SURGICAL stale-m₂-under-prune cure: at each prune EVENT,
                                 # multiply the slow EMA m₂ by (1−this) on the pruned (core/CMS) params
                                 # BEFORE the step, clearing stale pre-prune momentum the moment the
                                 # topology (loss landscape) moves. 0.0=off; try 0.1/0.25/0.5; 1.0=full
                                 # reset (erases AdEMAMix's edge — pruning fires every prune_interval).
  ademamix_eps_inside_patterns: []  # (b1zero, de-fused) LAYER-TARGETED eps placement: params whose name
                                 # contains any of these substrings use eps-INSIDE (√(ν/bc2+ε) floor →
                                 # stabilize), the rest stay eps-OUTSIDE (full advantage). The mechanism-
                                 # matched fix if the eps-out small-ν oscillation is localized to a few
                                 # boundary layers. Ablate: ["prelude.0.mlp"] → ["prelude"] → ["prelude","coda"].

  # ── Deploy quant stack (ALL ON by default — validated winners) ──
  # Ternary QAT: forward-STE on weights → {-1,0,+1}×scale. Training ppl IS deployed-ternary ppl.
  ternary: true
  ternary_scope: backbone        # MLP/mix/mhc proj; attn projections stay bf16
  ternary_threshold: 0.5         # |w/scale| > threshold → nonzero (Bonsai default)
  ternary_scale_mode: symmetric  # symmetric wins at this scale (A-series result)
  ternary_scale_group: tensor    # per-tensor scale
  ternary_scale_dtype: fp16      # fp16 scale storage
  ternary_scale_clip_mult: 0.0   # Task #276 "B": per-group UPPER BOUND on ternary scale γ=mean(|W|),
                                 # = this × initial γ (anchored, so a blowup can't ratchet it up). γ is
                                 # the WHOLE magnitude carrier of the {-1,0,+1}×γ weight → caps layer
                                 # output magnitude = structural backstop vs the g-collapse→α·m₂ blowup,
                                 # optimizer-independent. 0=off; try 8 (8× init headroom for healthy
                                 # growth, hard stop on the 1e3-1e5× explosion). Symmetric mode only.

  # 8-bit AdamW via bitsandbytes (quantizes optimizer state m,v to uint8)
  adam8bit: true

  # Embedding int6 QAT. Per-row int6 STE on euc+bigram (Lorentz stays bf16 — geometry-sensitive).
  embed_quant: "int6"            # off | int8 | int6. QUOTED: bare off is YAML bool False.
  lm_head_quant: "off"           # off | int6. QUOTED.

  # Attention-projection int8 QAT. Per-output-row int8 STE on CCA Linears. Disjoint from ternary backbone.
  attn_proj_quant: "off"         # off | int8 | int6 | int4. QUOTED. Winner=off (reproduces validated 33.82);
                                 # int8 is a deploy opt-in that needs its own 25k validation before becoming default.

  # FP8: dead at d=768 scale (small-GEMM regime); ternary and FP8 are mutually exclusive per-layer.
  fp8: false
  fp8_recipe: dynamic
  fp8_scope: mlp
  fp8_filter_min_dim: 256

  # Evaluation / logging
  eval_every: 500
  n_eval_batches: 20
  ckpt_every: 2500
  gen_every: 0      # 0 = disabled; set e.g. 5000 for generation samples
  gen_test: false   # run generation test at end of training

  # Resume — path to a checkpoint for a FULL resume ("like nothing happened": model +
  # carve/route topology + optimizer + scaler + RNG + step + pruning phase). null = fresh
  # run. Must be a real key (not commented) so `training.resume=<path>` works from the CLI.
  resume: null

# Routing — whole-body ReMoE (prelude+core+coda). ALWAYS ON in the hotpath.
# route_start = training-phase schedule: routing code activates at this step.
# (There is no "routing off" code path — routing is unconditional in the forward pass
#  once the carve has been applied. route_start just gates the training-time routing head.)
routing:
  route_start: 30000             # engage ReMoE 1000 steps after carve (compact 29000); = TST superposition→recovery boundary
  route_scope: all               # whole-body ReMoE (12 MLPs); winner used all. Code default "core" = 6 MLPs only
  n_clusters: 16
  activation_ratio: 0.5
  aux_loss_coeff: 0.01
  aux_detach_input: true         # feed router x.detach() → load-balance aux grad stays out of
                                 # the looped carrier (prevents OOM from extended BPTT depth)

data:
  # datasets>=4.x dropped script datasets; load from locally-cached OWT arrow shards instead.
  # OFFLINE, IDENTICAL to the #186 data → ppl stays comparable.
  dataset: /home/wolfe/.cache/huggingface/datasets/openwebtext/**/openwebtext-train-*.arrow
  tokenizer: bigcode/starcoder2-7b
  seq_len: 4096

wandb:
