# Loop-axis SSM ablation (#232) — SHARED settings for all arms.
# Clean baseline (no quant, pruning + routing OFF) so each arm's effect is attributed purely to
# the SSM change. Paired vs the #186 dense baseline (val ppl ~39.46). All arms are identity-at-init
# (see ignore/verify_loop_ssm.py + Ai-notes/06-07-2026/MORPH-LoopSSM-Ablation/design.md), so each
# starts exactly at baseline dynamics and diverges only through learning.
defaults:
  - base
  - _self_
training:
  steps: 15000
  prune_start: 9999999      # pruning OFF — isolate the SSM change
  compact_step: 9999999
routing:
  route_start: 0            # routing OFF
wandb:
  project: morph-ssm-ablation
